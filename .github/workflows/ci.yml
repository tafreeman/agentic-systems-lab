name: CI

# CI: verifies Python imports, frontend build, ruff lint, strict mypy on the
# core runtime surface, and the 80% coverage gate.
# Integration and slow tests are excluded from the fast CI pass.

on:
  push:
    branches: [main, agenticv2]
  pull_request:
    branches: [main, agenticv2]

jobs:
  python-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          pip install -e "."
          pip install -e "./agentic-workflows-v2[dev,server,langchain]"
          pip install -e "./agentic-v2-eval[dev]"
      - name: Verify critical imports
        run: |
          python -c "
          import agentic_v2
          from agentic_v2.core.protocols import AgentProtocol, ToolProtocol, ExecutionEngine
          from agentic_v2.workflows import WorkflowLoader
          print('Critical imports OK')
          "
      - name: Run smoke tests
        run: |
          python -m pytest agentic-workflows-v2/tests/test_tier0.py -q

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: agentic-workflows-v2/ui/package-lock.json
      - name: Install and build UI
        run: |
          cd agentic-workflows-v2/ui
          npm ci
          npm run build

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          pip install -e "."
          pip install -e "./agentic-workflows-v2[dev]"
      - name: Ruff lint check
        run: |
          cd agentic-workflows-v2
          python -m ruff check agentic_v2/ tests/
      - name: Guard ruff ignore list for untracked suppressions
        # Fail if any ruff ignore code lacks a `# tracked: <issue-url>` comment.
        # Codes suppressed for large-scale batch migration carry a "TODO Sprint"
        # comment which is deliberately distinct — those are the exempted entries.
        # New one-off suppressions must include either an inline trailing comment
        # OR a comment on the immediately-preceding non-empty line (block style).
        run: |
          python - <<'EOF'
          import re, sys, pathlib
          text = pathlib.Path("agentic-workflows-v2/pyproject.toml").read_text()
          # Extract the ignore list block between [tool.ruff.lint] ignore = [ and the closing ]
          ignore_block = re.search(r"ignore\s*=\s*\[(.*?)\]", text, re.DOTALL)
          if not ignore_block:
              sys.exit(0)
          lines = ignore_block.group(1).splitlines()
          bad = []
          for idx, line in enumerate(lines):
              stripped = line.strip()
              # Skip empty lines, comment-only lines, and closing bracket
              if not stripped or stripped.startswith("#") or stripped == "]":
                  continue
              # Must be a quoted rule code
              if not re.match(r'^"[A-Z][A-Z0-9]+"', stripped):
                  continue
              # Allow if the line has a TODO-Sprint comment (batch migration)
              if "TODO Sprint" in line or "TODO:" in line:
                  continue
              # Allow if the line has a tracked: comment (inline)
              if "tracked:" in line:
                  continue
              # Allow if the line has ANY inline comment (descriptive)
              if "#" in line:
                  continue
              # Allow if the immediately-preceding non-empty line is a comment
              # (block-style documentation — comment sits on the line above the code)
              prev_comment = False
              for prev_idx in range(idx - 1, -1, -1):
                  prev_stripped = lines[prev_idx].strip()
                  if not prev_stripped:
                      continue  # skip blank lines when scanning backward
                  if prev_stripped.startswith("#"):
                      prev_comment = True
                  break
              if prev_comment:
                  continue
              bad.append(stripped)
          if bad:
              print("::error::New ruff ignore entries must include either a")
              print("  '# tracked: <issue-url>' comment, a '# TODO Sprint' comment,")
              print("  an inline comment, or a block comment on the preceding line.")
              print("  Offending lines:")
              for b in bad:
                  print(f"    {b}")
              sys.exit(1)
          print(f"Ruff ignore guard: all {len(lines)} entries have comments.")
          EOF

  typecheck-core-contracts:
    name: Mypy (strict engine + contracts)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          pip install -e "."
          pip install -e "./agentic-workflows-v2[dev]"
      - name: Run strict mypy ratchet
        run: |
          cd agentic-workflows-v2
          python -m mypy agentic_v2/engine agentic_v2/contracts \
            --config-file pyproject.toml \
            --follow-imports=skip \
            --disallow-untyped-defs \
            --warn-return-any \
            --show-error-codes \
            --no-incremental

  test-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          pip install -e "."
          pip install -e "./agentic-workflows-v2[dev,server,langchain]"
      - name: Run tests with coverage
        # pytest-cov 7.x prints `FAIL Required test coverage of N% not reached`
        # but does not propagate a non-zero exit when the test session passed,
        # which can leave a sub-threshold coverage run inside a green CI job.
        # We therefore collect coverage here without `--cov-fail-under` and
        # enforce the gate explicitly in the next step via `coverage report
        # --fail-under=80`, which is guaranteed to exit non-zero when below.
        run: |
          cd agentic-workflows-v2
          python -m pytest tests/ -q \
            -m "not integration and not slow" \
            --cov=agentic_v2 \
            --cov-report=term-missing
      - name: Enforce 80% coverage gate
        run: |
          cd agentic-workflows-v2
          python -m coverage report --fail-under=80

  wire-format-drift:
    # Sprint B #3 — prevent silent Python <-> TypeScript wire-format drift.
    # `agentic_v2/contracts/events.py` is the source of truth; this job
    # regenerates the committed JSON Schema + TS mirror and fails the PR if
    # the working tree no longer matches what's checked in.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: agentic-workflows-v2/ui/package-lock.json
      - name: Install backend
        run: |
          python -m pip install --upgrade pip
          pip install -e "."
          pip install -e "./agentic-workflows-v2[dev]"
      - name: Install UI
        run: |
          cd agentic-workflows-v2/ui
          npm ci
      - name: Regenerate Python JSON schema
        run: |
          cd agentic-workflows-v2
          python scripts/generate_ts_types.py
      - name: Regenerate TypeScript types
        run: |
          cd agentic-workflows-v2/ui
          npm run generate:types
      - name: Fail on drift
        run: |
          if ! git diff --exit-code -- \
              agentic-workflows-v2/tests/schemas/events.schema.json \
              agentic-workflows-v2/ui/src/api/events.generated.ts; then
            echo "::error::Wire-format drift detected. Run 'python scripts/generate_ts_types.py' and 'npm --prefix ui run generate:types' from agentic-workflows-v2/ and commit the result."
            exit 1
          fi

  e2e-streaming:
    # Epic 2 Story 2.2 — Playwright streaming PR gate.
    # Runs the streaming spec 5× to catch flakes early. The rolling nightly
    # 50× job (Story 2.4) measures the long-term flake rate.
    #
    # LLM credentials: GITHUB_TOKEN + `models: read` permission let the
    # runtime reach GitHub Models for a zero-config LLM backend in CI. When
    # placeholder-mode support is implemented (tracked separately), this
    # dependency can be dropped.
    runs-on: ubuntu-latest
    permissions:
      contents: read
      models: read
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: agentic-workflows-v2/ui/package-lock.json
      - name: Install backend (server extra)
        run: |
          python -m pip install --upgrade pip
          pip install -e "."
          pip install -e "./agentic-workflows-v2[dev,server,langchain]"
      - name: Install UI + Playwright
        run: |
          cd agentic-workflows-v2/ui
          npm ci
          npx playwright install --with-deps chromium
      - name: Run streaming E2E 5×
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd agentic-workflows-v2/ui
          npm run test:e2e:5x
      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-artifacts
          path: |
            agentic-workflows-v2/ui/test-results/
            agentic-workflows-v2/ui/playwright-report/
            agentic-workflows-v2/ui/e2e-results.json
          retention-days: 14
          if-no-files-found: ignore
