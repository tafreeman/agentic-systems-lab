name: Eval Package CI

on:
  workflow_dispatch:
  push:
    branches: [main, agenticv2]
    paths:
      - 'agentic-v2-eval/**'
      - 'tools/**'
      - '.github/workflows/eval-package-ci.yml'
      - 'pyproject.toml'
      - 'uv.lock'
  pull_request:
    branches: [main, agenticv2]
    paths:
      - 'agentic-v2-eval/**'
      - 'tools/**'
      - '.github/workflows/eval-package-ci.yml'
      - 'pyproject.toml'
      - 'uv.lock'

defaults:
  run:
    working-directory: agentic-v2-eval

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.11', '3.12']

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".."
          pip install -e ".[dev]"
      - name: Run tests with coverage
        run: |
          python -m pytest tests/ -v --cov=src/agentic_v2_eval --cov-report=xml --cov-report=term-missing --cov-fail-under=80

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        uses: codecov/codecov-action@v6
        with:
          files: agentic-v2-eval/coverage.xml
          flags: eval-package
          fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy

      - name: Run ruff
        run: ruff check src/

      - name: Run ruff format check
        run: ruff format --check src/

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".."
          pip install -e ".[dev]"

      - name: Run mypy
        run: |
          python -m mypy src/agentic_v2_eval --config-file pyproject.toml

  build:
    runs-on: ubuntu-latest
    needs: [test, lint, type-check]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build package
        run: python -m build

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: agentic-v2-eval/dist/
