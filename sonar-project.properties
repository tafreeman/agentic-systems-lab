# SonarQube analysis configuration for agentic-systems-lab
# Server-side project key: "agentic-systems-lab"
#
# Secrets are NOT stored in this file. Provide these at scan time instead:
#   sonar.host.url  -> http://localhost:9000 (from host) / http://host.docker.internal:9000 (from a container)
#   sonar.token     -> env SONAR_TOKEN or -Dsonar.token=...   (NEVER commit a token)

sonar.projectKey=agentic-systems-lab
sonar.projectName=Agentic Systems Lab
sonar.sources=.
sonar.sourceEncoding=UTF-8

# Non-source / generated trees excluded from analysis.
sonar.exclusions=**/node_modules/**,**/.venv/**,**/venv/**,**/__pycache__/**,**/.ruff_cache/**,**/dist/**,**/build/**,**/coverage/**,**/runs/**,**/.sonar/**,**/.scannerwork/**,**/.git/**,**/*.min.js,package-lock.json,uv.lock

# Test code is excluded from the coverage denominator (exercised, not measured)
# so new-code coverage reflects production lines only.
sonar.coverage.exclusions=**/tests/**,**/test_*.py,**/*_test.py,**/conftest.py,**/__tests__/**,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/e2e/**

# Coverage reports (optional; generate before a scan):
#   pytest --cov ... --cov-report=xml:coverage.xml ; vitest run --coverage
sonar.python.coverage.reportPaths=coverage.xml
sonar.javascript.lcov.reportPaths=agentic-workflows-v2/ui/coverage/lcov.sonar.info

sonar.scm.disabled=true
